name: pnpm-install
description: Run pnpm install with cache enabled

inputs:
  bryntum_access_token:
    description: Required to install @bryntum/scheduler package
    required: true

runs:
  using: composite

  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v5

    - name: Use Node.js 24
      uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: |
        pnpm config set '@bryntum:registry' 'https://npm.bryntum.com'
        pnpm config set '//npm.bryntum.com/:_authToken' "${{ inputs.bryntum_access_token }}"
        pnpm install --frozen-lockfile

    # node-canvas has no prebuild for Node 24 yet; rebuild compiles from source and needs Cairo/Pixman dev libs.
    - name: Install canvas native build dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          pkg-config \
          libcairo2-dev \
          libpango1.0-dev \
          libjpeg-dev \
          libgif-dev \
          librsvg2-dev

    - name: Rebuild native dependencies
      shell: bash
      run: pnpm rebuild canvas

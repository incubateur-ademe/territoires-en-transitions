name: Déploiement à la demande de l'api d'automatisation technique

permissions:
  contents: read

run-name: Déploiement de l'api d'automatisation technique sur ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: Quel environnement ?
        options:
          - preprod
          - staging
          - prod

jobs:
  build-tools:
    name: Build l'api d'automatisation technique
    uses: ./.github/workflows/build-tools.yml
    with:
      environment: ${{ github.event.inputs.target }}
      push: ${{ !env.ACT }}
    secrets: inherit

  deploy-tools:
    name: Déploie l'api d'automatisation technique
    needs: build-tools
    environment: ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Deploy tools on Koyeb
        uses: ./.github/actions/koyeb-deploy
        with:
          api_token: ${{ secrets.KOYEB_API_KEY }}
          environment: ${{ github.event.inputs.target }}
          component: tools
          image_path: ${{ needs.build-tools.outputs.image_path }}

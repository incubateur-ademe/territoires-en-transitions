name: Déploiement de l'app
run-name: Déploiement de l'app ${{ github.event.inputs.is-test-app == 'true' && '(test)' || '' }} sur ${{ github.event.inputs.target }}

on:
  workflow_dispatch:
    inputs:
      target:
        type: choice
        description: Quel environnement ?
        options:
          - preprod
          - staging
          - prod
      is-test-app:
        type: boolean
        description: Application de test

jobs:
  build-app:
    name: Build l'app
    if: ${{ github.event.inputs.is-test-app != 'true' }}
    uses: ./.github/workflows/build-app.yml
    with:
      environment: ${{ github.event.inputs.target }}
      push: ${{ !env.ACT }}
    secrets: inherit

  build-test-app:
    name: Build l'app de test
    if: ${{ github.event.inputs.is-test-app == 'true' }}
    uses: ./.github/workflows/build-app-test.yml
    with:
      environment: ${{ github.event.inputs.target }}
      push: ${{ !env.ACT }}
    secrets: inherit

  deploy-app:
    name: Déploie l'app
    if: ${{ github.event.inputs.is-test-app != 'true' }}
    needs: build-app
    environment: ${{ github.event.inputs.target }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy app on Koyeb
        uses: ./.github/actions/koyeb-deploy
        with:
          api_token: ${{ secrets.KOYEB_API_KEY }}
          environment: ${{ github.event.inputs.target }}
          component: app
          image_path: ${{ needs.build-app.outputs.image_path }}

  deploy-test-app:
    name: Déploie l'app de test
    if: ${{ github.event.inputs.is-test-app == 'true' }}
    needs: build-test-app
    environment: preprod-koyeb
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy test app on Koyeb
        uses: ./.github/actions/koyeb-deploy
        with:
          api_token: ${{ secrets.KOYEB_API_KEY }}
          environment: ${{ github.event.inputs.target }}
          component: app-test
          image_path: ${{ needs.build-test-app.outputs.image_path }}
